- id: lint-shell-portability
  name: Shell portability (no GNU-only syntax)
  language: python
  entry: lint-shell-portability
  types: [shell]

- id: lint-no-chinese
  name: No Chinese characters in source
  language: python
  entry: lint-no-chinese
  exclude: '(^|/)requirements(/|$)|(^|/)docs/zh(/|$)|(^|/)(AGENTS|CLAUDE)\.md$'

- id: lint-file-line-count
  name: File line-count limit
  language: python
  entry: lint-file-line-count
  exclude: '(^|/)(generated|gen|genfiles|proto_gen|pb_gen|vendor|third_party)(/|$)|(^|/)(uv\.lock|poetry\.lock|Pipfile\.lock|package-lock\.json|pnpm-lock\.yaml|yarn\.lock)$'

- id: lint-backend-bare-dict
  name: No bare dict in backend Python
  language: python
  entry: lint-backend-bare-dict
  types: [python]
  exclude: '(^|/)tests?/'

- id: lint-enum-redundant-string
  name: No redundant enum string literals
  language: python
  entry: lint-enum-redundant-string
  types: [python]
  exclude: '(^|/)tests?/'

- id: uv-lock-check
  name: uv.lock in sync with pyproject.toml
  language: python
  entry: uv-lock-check
  files: '(^|/)(pyproject\.toml|uv\.lock)$'
  pass_filenames: true

- id: lint-pre-commit-hook-languages
  name: Pre-commit hook language selection
  language: python
  entry: lint-pre-commit-hook-languages
  types: [yaml]
  files: ^\.pre-commit-(?:config|hooks)\.yaml$
  exclude: '^$'

- id: lint-no-ignored-files
  name: No gitignored files in staging
  language: python
  entry: lint-no-ignored-files

# Enforce the "portable single-file script" convention: any script meant to be
# carried around and run by other people must be self-contained — declare its
# Python version and dependencies inline (PEP 723), and provide a docstring
# that shows the canonical `uv run <self>` invocation.
#
# Use when: the scoped directory holds scripts intended to be portable
#   (e.g. tooling, examples, per-feature `scripts/`). The hook fails any file
#   missing a PEP 723 header or `uv run` docstring example — that is the
#   violation, not a "skip".
# Skip the directory only when: it holds traditional package modules consumed
#   via `import` from other code, where portability is a non-goal.
- id: lint-pep723-header
  name: PEP 723 header compliance (requires-python + uv run docstring example)
  language: python
  entry: lint-pep723-header
  types: [python]
  # Excludes:
  #   - __init__.py marks a package, not a script; never has a PEP 723 header.
  #   - tests/ holds pytest modules consumed via `import`, not portable scripts.
  exclude: '(^|/)__init__\.py$|(^|/)tests?/'
